permalink   : /:categories/:year/:title/
markdown    : kramdown
highlighter : pygments

paginate: 5 #6
comments: true
paginate_path: "/page/:num"

source: source
destination: _site
sass:
  sass_dir: _scss
  style: compressed

cover: /assets/images/default-cover.png

